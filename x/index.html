<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Math-Tex X</title>

  <script src="https://cdn.jsdelivr.net/npm/mathjs@11.11.0/lib/browser/math.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>

<body class="d-flex justify-content-center align-items-center min-vh-100 bg-dark">

<div class="card text-center" style="width: 400px;">
    <div class="card-body">
        <h1>Math-Tex <span class="badge text-bg-dark">X</span></h1>
        <hr>
        <h5 class="card-title">Calculatrice de dérivée</h5>
        <p class="card-text">
            Pour utiliser la calculatrice, merci de taper une expression mathématique au format <b>LaTeX</b>.
        </p>
        <hr>
        <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="sin(x)*exp(x) + 4x" aria-label="Username" aria-describedby="basic-addon1" id="expr">
            <button class="btn btn-primary" type="button" id="button-addon2" onclick="calc()">Dériver</button>
        </div>      
        <hr>
        <p id="out"></p>
        <hr>
        <p id="latex"></p>
    </div>
</div>

<script>
function calc() {
    const expr = document.getElementById("expr").value;

    const node = math.parse(expr);
    const deriv = math.derivative(node, "x");

    const latex = deriv.toTex();

    document.getElementById("out").innerHTML =
        katex.renderToString(latex);

    document.getElementById("latex").innerHTML = latex;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
